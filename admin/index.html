<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS - GrünBlatt Gärtnerei</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    #pat-form {
      max-width: 420px; margin: 120px auto; padding: 2rem;
      background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    #pat-form h2 { margin-bottom: 0.5rem; color: #2e7d32; }
    #pat-form p { margin-bottom: 1.5rem; color: #666; font-size: 0.9rem; }
    #pat-form input {
      width: 100%; padding: 0.8rem; margin-bottom: 1rem;
      border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem;
    }
    #pat-form input:focus { outline: none; border-color: #2e7d32; }
    #pat-form button {
      width: 100%; padding: 0.8rem; background: #2e7d32; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer;
    }
    #pat-form button:hover { background: #1b5e20; }
    #pat-form .hint { margin-top: 1rem; font-size: 0.8rem; color: #999; }
    #pat-form .hint a { color: #2e7d32; }
    #pat-form .error { color: #d32f2f; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
  <div id="pat-form" style="display:none">
    <h2>🔑 CMS Login</h2>
    <p>GitHub Personal Access Token eingeben</p>
    <div class="error" id="pat-error">Token ungültig – bitte prüfen (Scope: repo, user)</div>
    <input type="password" id="pat-input" placeholder="ghp_..." autocomplete="off">
    <button onclick="handlePAT()">Login</button>
    <div class="hint">
      Token erstellen auf <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a><br>
      Benötigte Scopes: <code>repo</code>, <code>user</code>
    </div>
  </div>

  <div id="cms-loading" style="display:none;text-align:center;padding:80px;color:#666;">
    Lade CMS...
  </div>

  <script>
  const STORAGE_KEY = 'cmstest_gh_pat'

  function b64enc(str) {
    return btoa(unescape(encodeURIComponent(str)))
  }
  function b64dec(str) {
    return decodeURIComponent(escape(atob(str)))
  }

  function showForm() {
    document.getElementById('pat-form').style.display = 'block'
  }

  function showCMS() {
    document.getElementById('cms-loading').style.display = 'block'
    loadDecapCMS()
  }

  async function handlePAT() {
    const input = document.getElementById('pat-input')
    const error = document.getElementById('pat-error')
    const token = input.value.trim()
    if (!token) return
    const ok = await verifyToken(token)
    if (ok) {
      localStorage.setItem(STORAGE_KEY, token)
      document.getElementById('pat-form').style.display = 'none'
      showCMS()
    } else {
      error.style.display = 'block'
    }
  }

  async function verifyToken(token) {
    try {
      const res = await fetch('https://api.github.com/user', {
        headers: { Authorization: `token ${token}` }
      })
      return res.ok
    } catch { return false }
  }

  function getPAT() {
    return localStorage.getItem(STORAGE_KEY)
  }

  class PATGitHubBackend {
    constructor(config) {
      this.config = config
      this.repo = config.repo
      this.branch = config.branch || 'main'
      this.token = getPAT()
      this._user = null
    }

    _gh(url, opts = {}) {
      const headers = {
        Authorization: `token ${this.token}`,
        Accept: 'application/vnd.github.v3+json',
      }
      const merged = { ...opts, headers: { ...headers, ...opts.headers } }
      return fetch(`https://api.github.com${url}`, merged).then(async res => {
        const data = res.status === 204 ? null : await res.json()
        if (!res.ok) throw new Error(data?.message || `HTTP ${res.status}`)
        return data
      })
    }

    _repo() {
      const p = this.repo.split('/')
      return { owner: p[0], repo: p[1] }
    }

    // ── Auth ──

    authenticate(state) {
      const pat = state?.token || this.token
      if (!pat) { localStorage.removeItem(STORAGE_KEY); throw new Error('No token') }
      this.token = pat
      return this._gh('/user').then(user => {
        this._user = user
        return { token: pat, login: user.login }
      })
    }

    currentUser() {
      if (this._user) return Promise.resolve(this._user)
      const pat = getPAT()
      if (pat && !this.token) this.token = pat
      if (!this.token) return Promise.reject(new Error('Not authenticated'))
      return this._gh('/user').then(user => {
        this._user = user
        return user
      })
    }

    logout() {
      localStorage.removeItem(STORAGE_KEY)
      this.token = null
      this._user = null
      return Promise.resolve()
    }

    getToken() { return Promise.resolve(this.token) }

    // ── Entries ──

    getEntry(collection, slug) {
      const { owner, repo } = this._repo()
      let path = slug
      if (collection.files) {
        const f = collection.files.find(f => f.name === slug)
        if (f) path = f.file
      } else if (collection.folder) {
        path = `${collection.folder}/${slug}.md`
      }
      return this._gh(`/repos/${owner}/${repo}/contents/${path}?ref=${this.branch}`)
        .then(data => data ? { file: { path, slug, sha: data.sha, id: data.sha }, data: b64dec(data.content) } : null)
        .catch(() => null)
    }

    getEntries(collection) {
      if (collection.files) {
        return Promise.all(collection.files.map(f => this.getEntry(collection, f.name)))
          .then(results => results.filter(Boolean))
      }
      if (collection.folder) {
        const { owner, repo } = this._repo()
        return this._gh(`/repos/${owner}/${repo}/contents/${collection.folder}?ref=${this.branch}`)
          .then(data => Promise.all(data.filter(i => i.name.endsWith('.md')).map(item =>
            this._gh(`/repos/${owner}/${repo}/contents/${item.path}?ref=${this.branch}`)
              .then(c => ({
                file: { path: item.path, slug: item.name.replace('.md', ''), sha: c.sha, id: c.sha },
                data: b64dec(c.content)
              }))
          )))
          .catch(() => [])
      }
      return Promise.resolve([])
    }

    persistEntry(entry, options) {
      const { owner, repo } = this._repo()
      const files = entry.dataFiles || [entry]
      return Promise.all(files.map(file => {
        const path = file.path || this.config.collections?.find(c => c.name === options?.collection)?.files?.find(f => f.name === file.slug)?.file
        return this._gh(`/repos/${owner}/${repo}/contents/${path}?ref=${this.branch}`)
          .then(existing => ({ sha: existing?.sha }))
          .catch(() => ({}))
          .then(({ sha }) =>
            this._gh(`/repos/${owner}/${repo}/contents/${path}`, {
              method: 'PUT',
              body: JSON.stringify({
                message: `Update ${path}`,
                content: b64enc(file.raw || ''),
                branch: this.branch,
                sha,
              }),
            })
          )
      })).then(() => {})
    }

    deleteEntry(collection, slug) {
      const { owner, repo } = this._repo()
      let path = slug
      if (collection.files) {
        const f = collection.files.find(f => f.name === slug)
        if (f) path = f.file
      }
      return this._gh(`/repos/${owner}/${repo}/contents/${path}?ref=${this.branch}`)
        .then(existing => {
          if (!existing) return
          return this._gh(`/repos/${owner}/${repo}/contents/${path}`, {
            method: 'DELETE',
            body: JSON.stringify({ message: `Delete ${path}`, sha: existing.sha, branch: this.branch }),
          })
        }).catch(() => {})
    }

    // ── Media ──

    getMedia() {
      const { owner, repo } = this._repo()
      const folder = this.config.media_folder || 'assets/images'
      return this._gh(`/repos/${owner}/${repo}/contents/${folder}?ref=${this.branch}`)
        .then(data => data.map(item => ({
          id: item.sha, name: item.name, path: item.path,
          url: `https://raw.githubusercontent.com/${owner}/${repo}/${this.branch}/${item.path}`,
          thumbnail: item.download_url, sha: item.sha,
        }))).catch(() => [])
    }

    persistMedia(file, options) {
      const { owner, repo } = this._repo()
      const folder = options.mediaFolder || this.config.media_folder || 'assets/images'
      const path = `${folder}/${file.name}`
      return this._gh(`/repos/${owner}/${repo}/contents/${path}?ref=${this.branch}`)
        .then(existing => ({ sha: existing?.sha }))
        .catch(() => ({}))
        .then(({ sha }) =>
          this._gh(`/repos/${owner}/${repo}/contents/${path}`, {
            method: 'PUT',
            body: JSON.stringify({
              message: `Upload ${file.name}`,
              content: file.toBase64 ? file.toBase64() : file.content,
              branch: this.branch,
              sha,
            }),
          })
        ).then(() => ({
          id: path, name: file.name, path,
          url: `https://raw.githubusercontent.com/${owner}/${repo}/${this.branch}/${path}`,
          size: file.size,
        }))
    }

    deleteMedia(mediaFile) {
      const { owner, repo } = this._repo()
      const path = mediaFile.path
      return this._gh(`/repos/${owner}/${repo}/contents/${path}?ref=${this.branch}`)
        .then(existing => {
          if (!existing) return
          return this._gh(`/repos/${owner}/${repo}/contents/${path}`, {
            method: 'DELETE',
            body: JSON.stringify({ message: `Delete ${path}`, sha: existing.sha, branch: this.branch }),
          })
        }).catch(() => {})
    }

    // ── Stubs (editorial workflow etc.) ──

    asyncEntry() { return {} }
    unpublishedEntries() { return Promise.resolve([]) }
    unpublishedEntry() { return Promise.resolve() }
    unpublishedEntryDataFile() { return Promise.resolve() }
    unpublishedEntryMediaFile() { return Promise.resolve() }
    deleteUnpublishedEntry() { return Promise.resolve() }
    publishUnpublishedEntry() { return Promise.resolve() }
    updateUnpublishedEntryStatus() { return Promise.resolve() }
    deployPreview() { return Promise.resolve(null) }
    allEntriesByCollection() { return Promise.resolve({}) }
  }

  function loadDecapCMS() {
    const script = document.createElement('script')
    script.src = 'https://unpkg.com/decap-cms@^3/dist/decap-cms.js'
    script.onload = () => {
      CMS.registerBackend('pat-github', PATGitHubBackend)
      CMS.init()
    }
    document.body.appendChild(script)
  }

  ;(async function init() {
    const pat = getPAT()
    if (pat) {
      const ok = await verifyToken(pat)
      if (ok) { showCMS(); return }
      localStorage.removeItem(STORAGE_KEY)
    }
    showForm()
  })()
  </script>
</body>
</html>
